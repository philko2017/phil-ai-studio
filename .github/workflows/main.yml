name: Notion to GitHub README Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python update_readme.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. 先把 README 加入暫存
          git add README.md
          
          # 2. 檢查 images 資料夾是否存在，存在才加入（避免第一次執行報錯）
          if [ -d "images" ]; then
            git add images/
          fi
          
          # 3. 檢查是否有變動，有的話才提交並推送到 GitHub
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update projects and images from notion" && git push)
