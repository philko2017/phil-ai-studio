name: Notion to GitHub README Sync

on:
  schedule:
    # 設定每天 UTC 時間 00:00 (台灣時間早上 8 點) 自動執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動點擊按鈕立即執行

permissions:
  contents: write # 賦予機器人寫入檔案的權限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python update_readme.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          # 只有在檔案有變動時才 commit，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update projects from notion" && git push)
